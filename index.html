        const ChatWidget = () => {
          const [isOpen, setIsOpen] = useState(false);
          const [messages, setMessages] = useState([
            { role: 'model', text: 'Hola. Soy el asistente virtual especializado de VERSIOR IMPORT\'S. ¿En qué le puedo ayudar hoy con su equipamiento clínico?' }

          const [input, setInput] = useState('');
          const [isLoading, setIsLoading] = useState(false);
          const messagesEndRef = useRef(null);

          const scrollToBottom = () => {
            messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
          };

          useEffect(() => {
            scrollToBottom();
          }, [messages]);

          const renderChatMessage = (text) => {
            const regex = /(haz clic aqu[ií] para contactarte directamente 👤 \+593 \d{2} \d{3} \d{4})/gi;
            const parts = text.split(regex);
            
            return parts.map((part, i) => {
              if (part.match(regex)) {
                const number = part.replace(/[^\d+]/g, '');
                return (
                  <a 
                    key={i} 
                    href={`https://wa.me/${number.replace('+', '')}`} 
                    target="_blank" 
                    rel="noopener noreferrer" 
                    className="font-bold underline cursor-pointer text-gray-900 hover:text-[#065581] transition-colors bg-gray-100 border border-gray-200/50 px-3 py-2 rounded-xl block mt-2 shadow-sm text-center"
                  >
                    {part}
                  </a>
                );
              }
              return part;
            });
          };

          /* 🛠️ MOTOR DE INTELIGENCIA ARTIFICIAL SIMULADO (Local NLP Engine) */
          const getLocalAIResponse = (userQuery) => {
            const query = userQuery.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            
            if (query.match(/(hola|buenos dias|buenas tardes|buenas noches|saludos|que tal|asistente)/)) {
              return "Hola, un saludo cordial de parte del equipo de VERSIOR IMPORT'S. Estoy aquí para resolver todas sus dudas sobre equipamiento clínico de salud visual, garantías y diseño de ópticas. ¿Sobre qué equipo o servicio le gustaría recibir asesoría hoy?";
            }
            
            if (query.match(/(7610|ark7610|ark-7610|autorrefractometro queratometro|refractometro)/)) {
              return "El Autorrefractómetro / Queratómetro ARK-7610 es nuestro estándar clínico. Incorpora sensor Hartmann de 150 puntos, pantalla táctil LCD ajustable y medición en pupilas de hasta 2.0 mm. Incluye mesa elevadora de cortesía. Para cotizaciones de este equipo, comunícate con nuestra asesora la Optómetra Eli Verdy: haz clic aquí para contactarte directamente 👤 +593 96 322 3843.";
            }

            if (query.match(/(600|rmk|rmk600|rmk-600|autotracking|automatizado)/)) {
              return "El RMK-600 es nuestro Autorrefractómetro avanzado con sistema de Autotracking inteligente y mentonera robótica. Mide en menos de 0.5 s, ideal para un alto flujo de pacientes. Para cotizaciones con nuestra asesora la Optómetra Eli Verdy, haz clic aquí para contactarte directamente 👤 +593 96 322 3843.";
            }

            if (query.match(/(lm-260|lm260|lensometro|lensometria)/)) {
              return "El Lensómetro Digital LM-260 incorpora cámara de alta resolución Hartmann y medición de transmitancia UV integrada (UV400-UVA). Para cotizar con nuestra asesora la Optómetra Eli Verdy, haz clic aquí para contactarte directamente 👤 +593 96 322 3843.";
            }

            if (query.match(/(vc-235|vc235|optotipo|pantalla|daltonismo|ambliopia)/)) {
              return "La Pantalla Optotipo VC-235 posee una pantalla LED/LCD de 23.5\" HD calibrable de 2.0m a 6.5m. Para cotizar con nuestra asesora la Optómetra Eli Verdy, haz clic aquí para contactarte directamente 👤 +593 96 322 3843.";
            }

            if (query.match(/(ls-4|ls4|lampara|hendidura|tonometro|biomicroscopia)/)) {
              return "La Lámpara de Hendidura LS-4 ofrece óptica premium con magnificación de 5 pasos e iluminación LED luz fría. Para cotizar con nuestra asesora la Optómetra Eli Verdy, haz clic aquí para contactarte directamente 👤 +593 96 322 3843.";
            }

            if (query.match(/(c-190|c190|unidad|unidad de diagnostico|sillon|foroptero)/)) {
              return "La Unidad de Diagnóstico C-190A es el centro ergonómico definitivo. Para planificar su consultorio y cotizar con nuestra asesora la Optómetra Eli Verdy, haz clic aquí para contactarte directamente 👤 +593 96 322 3843.";
            }

            if (query.match(/(remodelacion|construccion|laura|herrera|arquitecta|diseño|espacios)/)) {
              return "Nuestros servicios de diseño, construcción y adecuación de ópticas están a cargo de la Arquitecta Laura Herrera. Para planificar su nuevo espacio comercial, haz clic aquí para contactarte directamente 👤 +593 99 033 1482.";
            }

            if (query.match(/(capacitacion|entrenamiento|personal|uso de equipos|manejo|julieta|siguencia|doctora|oftalmologa)/)) {
              return "Garantizamos el rendimiento de su inversión entrenando de forma técnica y continua a su personal con la Dra. Oftalmóloga Julieta Siguencia. Para agendar una sesión, haz clic aquí para contactarte directamente 👤 +593 95 895 1408.";
            }

            if (query.match(/(posventa|garantia|stock|soporte|repuestos|mantenimiento|alexander|jacome|licenciado)/)) {
              return "Soporte técnico, garantías de 2 años y stock de repuestos a cargo del Licenciado Alexander Jácome. Para asistencia directa, haz clic aquí para contactarte directamente 👤 +593 98 765 4320.";

            if (query.match(/(precio|cotizacion|cuanto cuesta|comprar|pago|credito|costo|oferta|eli|verdy)/)) {
              return "Estaremos gustosos de enviarle una cotización formal. Por favor, comunícate con nuestra asesora la Optómetra Eli Verdy: haz clic aquí para contactarte directamente 👤 +593 96 322 3843.";

            if (query.match(/(mision|vision|valores|proposito|cultura|quienes somos|empresa)/)) {

          };

          const handleSend = () => {

            setInput('');
            setMessages(prev => [...prev, { role: 'user', text: userMsg }]);
            setIsLoading(true);

          return (
            <>
              {/* Botón Flotante */}
              <button 
                onClick={() => setIsOpen(!isOpen)} 
                className={`fixed bottom-6 right-6 w-16 h-16 rounded-full flex items-center justify-center text-white shadow-[0_8px_30px_rgba(6,85,129,0.3)] cursor-pointer transition-all duration-300 z-[100] ${isOpen ? 'bg-red-500 hover:bg-red-600 rotate-90' : 'bg-[#1FB4FA] hover:bg-[#0ea5e9] hover:scale-110'}`}
              >
                {isOpen ? <X size={28} /> : <MessageCircle size={28} />}

              {/* Ventana de Chat */}
              {isOpen && (
                 <div className="fixed bottom-28 right-6 w-[90vw] sm:w-96 bg-white rounded-3xl shadow-[0_20px_50px_rgba(6,85,129,0.2)] z-[100] overflow-hidden flex flex-col border border-gray-100 h-[500px] max-h-[75vh] animate-fade-in-up">

                       <div className="relative z-10 flex items-center gap-3">

                           <MessageCircle size={20} className="text-[#1FB4FA]" />
                         </div>
                         <div>
                           <h3 className="font-bold text-sm tracking-wide">Asistente VERSIOR</h3>
                           <p className="text-[10px] text-white/70 flex items-center gap-1.5 font-medium tracking-wider uppercase mt-0.5">
                             <span className="w-2.5 h-2.5 rounded-full bg-[#25D366] animate-pulse shadow-[0_0_8px_rgba(37,211,102,0.6)]"></span> En línea
                           </p>
                         </div>
                       </div>
                    </div>
                    
                    {/* Cuerpo de Mensajes */}
                    <div className="flex-grow overflow-y-auto p-5 space-y-4 bg-gray-50/50">
                       {messages.map((m, i) => (
                          <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                             <div className={`p-3.5 rounded-2xl max-w-[85%] text-sm leading-relaxed shadow-sm ${m.role === 'user' ? 'bg-[#1FB4FA] text-white rounded-tr-none' : 'bg-white text-[#065581] rounded-tl-none border border-gray-100 font-medium'}`}>
                               {renderChatMessage(m.text)}
                             </div>
                          </div>
                       ))}
                       {isLoading && (
                         <div className="flex justify-start animate-fade-in">
                           <div className="bg-white border border-gray-100 p-4 rounded-2xl rounded-tl-none flex gap-1.5 items-center shadow-sm">
                             <div className="w-2 h-2 bg-[#1FB4FA]/40 rounded-full animate-bounce"></div>
                             <div className="w-2 h-2 bg-[#1FB4FA]/70 rounded-full animate-bounce delay-100"></div>
                             <div className="w-2 h-2 bg-[#1FB4FA] rounded-full animate-bounce delay-200"></div>
                           </div>
                         </div>
                       )}
                       <div ref={messagesEndRef} />
                    </div>
                    
                    {/* Input Footer */}
                    <div className="p-4 bg-white border-t border-gray-100">
                      <form onSubmit={(e) => { e.preventDefault(); handleSend(); }} className="flex gap-2">
                        <input 
                          type="text" 
                          value={input} 
                          onChange={e => setInput(e.target.value)} 
                          placeholder="Consulte a nuestro asistente..." 
                          className="flex-grow bg-gray-50 border border-gray-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-[#1FB4FA]/50 focus:border-[#1FB4FA] text-sm text-[#065581] placeholder-gray-400 transition-all" 
                        />
                        <button 
                          type="submit" 
                          disabled={isLoading || !input.trim()} 
                          className="bg-[#065581] text-white p-3 rounded-xl hover:bg-[#1FB4FA] transition-colors disabled:opacity-50 disabled:hover:bg-[#065581] shadow-md"
                        >
                          <Send size={20} className={!isLoading && input.trim() ? "translate-x-0.5 -translate-y-0.5 transition-transform" : ""} />
                        </button>
                      </form>
                    </div>
                 </div>
              )}
            </>
          );
        };

                        <TikTokIcon size={24} />
