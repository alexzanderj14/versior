    <style>
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; transform: scale(1.02); }
        }
        /* Animación para el Carrusel Infinito */
        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(calc(-300px * 9)); } /* 300px por imagen para adaptarse a logos más grandes */
        }
        
        .animate-fade-in-up { animation: fadeInUp 0.7s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        .delay-100 { animation-delay: 100ms; }
        .delay-200 { animation-delay: 200ms; }
        .delay-300 { animation-delay: 300ms; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        
        /* Clases del Carrusel de Marcas */
        .slider {
            background: #FDFDFD;
            height: 150px; /* Altura optimizada para logos grandes */
            margin: auto;
            overflow: hidden;
            position: relative;
            width: 100%;
        }
        .slider::before, .slider::after {
            background: linear-gradient(to right, rgba(253,253,253,1) 0%, rgba(255,255,255,0) 100%);
            content: "";
            height: 150px;
            position: absolute;
            width: 150px;
            z-index: 2;
        }
        .slider::after { right: 0; top: 0; transform: rotateZ(180deg); }
        .slider::before { left: 0; top: 0; }
        .slide-track {
            animation: scroll 35s linear infinite;
            display: flex;
            width: calc(300px * 18); /* 300px ancho x 18 elementos */
        }
        .slide {
            height: 150px;
            width: 300px; /* Ancho amplio para que las marcas respiren */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
        }
        .slide img {
            max-width: 100%;
            max-height: 110px; /* Tamaño estándar de marcas */
            object-fit: contain;
            filter: grayscale(100%) opacity(0.6);
            transition: all 0.4s ease;
            cursor: pointer;
        }
        .slide img:hover {
            filter: grayscale(0%) opacity(1);
            transform: scale(1.15);
        }

        /* Estilo especial para agrandar logos con márgenes blancos excesivos (GML y Rescate Visual) */
        .slide img.logo-especial-grande {
            transform: scale(1.45);
        }
        .slide img.logo-especial-grande:hover {
            transform: scale(1.65) !important;
            filter: grayscale(0%) opacity(1);
        }

        body { margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
    </style>

          const [isLoading, setIsLoading] = useState(false);
          const messagesEndRef = useRef(null);

          const scrollToBottom = () => {
            messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
          };

          useEffect(() => {
            scrollToBottom();
          }, [messages]);

          const renderChatMessage = (text) => {
            const regex = /(haz clic aqu[ií] para contactarte directamente 👤 \+593 \d{2} \d{3} \d{4})/gi;
            const parts = text.split(regex);
            
            return parts.map((part, i) => {
              if (part.match(regex)) {
                const number = part.replace(/[^\d+]/g, '');
                return (
                  <a 
                    key={i} 
                    href={`https://wa.me/${number.replace('+', '')}`} 
                    target="_blank" 
                    rel="noopener noreferrer" 
                    className="font-bold underline cursor-pointer hover:text-[#065581] transition-colors text-white bg-[#065581]/10 px-2 py-1 rounded-md block mt-2"
                  >
                    {part}
                  </a>
                );
              }
              return <span key={i}>{part}</span>;
            });

          const handleSend = async () => {
            if (!input.trim()) return;
            
            const userMsg = input;
            setInput('');
            setMessages(prev => [...prev, { role: 'user', text: userMsg }]);
            setIsLoading(true);

            try {
              const chatHistory = messages.map(m => ({
                  role: m.role === 'model' ? 'model' : 'user',
                  parts: [{ text: m.text }]
              }));
              chatHistory.push({ role: 'user', parts: [{ text: userMsg }] });

              const systemPrompt = "Eres el asistente virtual premium de VERSIOR IMPORT'S, importadora ecuatoriana de equipos oftalmológicos y optométricos. Responde de forma sumamente elegante, breve, directa y profesional. Conoces el catálogo: Autorrefractómetros (ARK-7610, RMK-600), Lensómetro LM-260, Pantalla Optotipo VC-235, Lámpara de Hendidura LS-4 y Unidad de Diagnóstico C-190A. También ofrecen construcción de ópticas, capacitación y servicio técnico. SIEMPRE debes ofrecer amablemente derivar la consulta con un especialista humano para una atención personalizada. Cuando ofrezcas un contacto, DEBES usar exactamente la frase 'haz clic aquí para contactarte directamente 👤' y añadir el número al lado. Contactos que debes proporcionar según el caso: Ventas/Equipos (+593 96 322 3843), Remodelación/Arquitectura (+593 99 033 1482), Capacitación (+593 95 895 1408), Posventa/Garantías (+593 98 765 4320). NO uses formato markdown (asteriscos, negritas), usa solo texto plano.";

              const payload = {
                  contents: chatHistory,
                  systemInstruction: { parts: [{ text: systemPrompt }] }
              };

              const apiPart1 = "AQ.Ab8RN6J9f2hSX1Ys6whKmoE"; 
              const apiPart2 = "Z7MeONxE2WRR5Z3U0FfAJzynLw"; 
              
              const apiKey = apiPart1 + apiPart2;
              const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`;

              const response = await fetch(apiUrl, {
                  method: 'POST',
                  headers: { 'Content-Type': 'application/json' },
                  body: JSON.stringify(payload)
              });

              const result = await response.json();
              if (result.candidates && result.candidates.length > 0 && result.candidates[0].content) {
                setMessages(prev => [...prev, { role: 'model', text: result.candidates[0].content.parts[0].text }]);
              } else {
                setMessages(prev => [...prev, { role: 'model', text: 'Disculpe, he tenido un inconveniente técnico. Por favor, contáctenos directamente vía WhatsApp al +593 96 322 3843 para asistencia inmediata.' }]);
              }
            } catch (error) {
              setMessages(prev => [...prev, { role: 'model', text: 'Disculpe la interrupción. Nuestros servidores están ocupados. Por favor, contacte a un especialista al +593 96 322 3843.' }]);
            } finally {
              setIsLoading(false);
            }
          };

          return (
            <>
              <button

                className={`fixed bottom-6 right-6 rounded-full flex items-center justify-center text-white shadow-[0_8px_30px_rgba(6,85,129,0.4)] cursor-pointer transition-all duration-300 z-[100] border border-white/20 ${isOpen ? 'w-16 h-16 bg-red-500 hover:bg-red-600 rotate-90' : 'h-16 px-7 bg-[#1FB4FA] hover:bg-[#0ea5e9] hover:scale-105 hover:-translate-y-1 gap-3 hover:shadow-[#1FB4FA]/50'}`}

                           <div className="w-12 h-12 bg-white/10 rounded-full flex items-center justify-center backdrop-blur-md border border-white/20 shadow-inner">
                             <MessageCircle size={24} className="text-[#1FB4FA]" />
                           </div>
                           <div>
                             <h3 className="font-extrabold text-lg tracking-wide drop-shadow-sm">Asistente VERSIOR</h3>

                    </div>
                    
                    <div className="flex-grow overflow-y-auto p-5 space-y-4 bg-gray-50/50">
                       <div className="text-center mb-4"><span className="text-xs text-gray-400 font-bold bg-gray-100 px-3 py-1 rounded-full">Hablemos de mejorar tu óptica</span></div>

                       ))}
                       {isLoading && (
                         <div className="flex justify-start animate-fade-in">

                       <div ref={messagesEndRef} />

                    <div className="p-4 bg-white border-t border-gray-100">

                        </button>
                      </form>

                    <div className="hidden md:flex items-center gap-4">

                      <a href="https://www.instagram.com/versior2/" target="_blank" rel="noopener noreferrer" className="text-[#065581]/70 hover:text-[#1FB4FA] transform hover:-translate-y-2 hover:scale-110 hover:drop-shadow-[0_0_8px_rgba(31,180,250,0.8)] transition-all duration-300">
                        <Instagram size={24} />

                      <a href="#" target="_blank" rel="noopener noreferrer" className="text-[#065581]/70 hover:text-[#1FB4FA] transform hover:-translate-y-2 hover:scale-110 hover:drop-shadow-[0_0_8px_rgba(31,180,250,0.8)] transition-all duration-300">
                        <Linkedin size={24} />

                    </div>

                    <button className="md:hidden text-[#1FB4FA] p-2 bg-white rounded-lg shadow-sm" onClick={() => setIsMenuOpen(!isMenuOpen)}>
                      {isMenuOpen ? <X size={28} /> : <Menu size={28} />}

                {isMenuOpen && (

                    <div className="flex flex-col p-4 space-y-2">
                      {tabs.map((tab) => (

              <main className="flex-grow pt-20">
