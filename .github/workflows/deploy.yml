  - name: Sincronizar con InfinityFree (FTP)
    uses: SamKirkland/FTP-Deploy-Action@v4.3.4
    with:
      server: ftpupload.net
      username: ${{ secrets.FTP_USERNAME }}
      password: ${{ secrets.FTP_PASSWORD }}
      server-dir: versiorimports.is-best.net/htdocs/
      protocol: ftp
      port: 21
      exclude: |
        **/.git*
        **/.git*/**
        .github/**
